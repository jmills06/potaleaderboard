name: Migrate GCS History (one-time)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run migration
        run: python scripts/migrate_gcs_history.py

      - name: Commit and push with rebase retry
        run: |
          git config user.name "pota-board-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Migrate GCS leaderboard history"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash -X theirs origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
